admin:
  enabled: true
  host: 127.0.0.1
  port: 7890
agents:
  build:
    - action: allow
      pattern: '*'
      permission: '*'
    - action: ask
    pattern: '*'
    permission: doom_loop
  - action: ask
    pattern: '*'
    permission: external_directory
  - action: allow
    pattern: ${HOME}/*
    permission: external_directory
  - action: deny
    pattern: '*'
    permission: question
  - action: deny
    pattern: '*'
    permission: plan_enter
  - action: deny
    pattern: '*'
    permission: plan_exit
  - action: ask
    pattern: '*.env'
    permission: read
  - action: ask
    pattern: '*.env.*'
    permission: read
  - action: allow
    pattern: '*.env.example'
    permission: read
  - action: allow
    pattern: '*'
    permission: task
  - action: allow
    pattern: '*'
    permission: todo
  plan:
  - action: allow
    pattern: '*'
    permission: '*'
  - action: ask
    pattern: '*'
    permission: doom_loop
  - action: allow
    pattern: ${HOME}/.opencode/plans/*
    permission: external_directory
  - action: allow
    pattern: '*'
    permission: question
  - action: deny
    pattern: '*'
    permission: plan_enter
  - action: allow
    pattern: '*'
    permission: plan_exit
  - action: deny
    pattern: '*'
    permission: edit
  - action: deny
    pattern: '*'
    permission: write
  - action: deny
    pattern: '*'
    permission: patch
  - action: deny
    pattern: '*'
    permission: apply_patch
  - action: deny
    pattern: '*'
    permission: multiedit
  - action: ask
    pattern: '*.env'
    permission: read
  - action: ask
    pattern: '*.env.*'
    permission: read
  - action: allow
    pattern: '*.env.example'
    permission: read
  - action: allow
    pattern: '*'
    permission: todo
  - action: allow
    pattern: '*'
    permission: task
context:
  max_tokens: 8000
  preserve_last_n: 6
  preserve_system: true
  strategy: sliding_window
  summarize_threshold: 0.8
  tool_truncation: null
exa:
  api_key: ${EXA_API_KEY}
  default_type: auto
  num_results: 10
file_tracker:
  cache_dir: .nanocode/cache
  enabled: true
file_watcher:
  enabled: true
  ignore:
  - .git
  - __pycache__
  - '*.pyc'
  - .pytest_cache
  - node_modules
  - .DS_Store
  - '*.swp'
  - '*.tmp'
  - .venv
  - venv
github: null
llm:
  default_model: opencode/hy3-preview-free
  default_provider: opencode
  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      model: claude-3-5-sonnet-20241022
    lm-studio:
      base_url: http://localhost:1234/v1
      model: local-model
    ollama:
      base_url: http://localhost:11434
      model: llama3
    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: https://api.openai.com/v1
      model: gpt-4o
    opencode:
      api_key: public
      base_url: https://opencode.ai/zen/v1
      model: hy3-preview-free
    openrouter:
      api_key: ${OPENROUTER_API_KEY}
      base_url: https://openrouter.ai/api/v1
      model: openrouter/free
    qiniu-ai:
      model: kling-v2-6
  use_model_registry: false
  user_agent: opencode/1.4.8
mcp:
  servers:
    exa:
      enabled: true
      url: https://mcp.exa.ai/mcp?tools=web_search_exa,deep_search_exa,get_code_context_exa
    openwebsearch:
      enabled: true
      url: https://open-web-search.vercel.app/mcp
messaging:
  enabled: false
  platforms:
    slack:
      app_token: ${SLACK_APP_TOKEN}
      bot_token: ${SLACK_BOT_TOKEN}
      enabled: false
      signing_secret: ${SLACK_SIGNING_SECRET}
      socket_mode: true
    telegram:
      bot_token: ${TELEGRAM_BOT_TOKEN}
      enabled: false
      phone_number_id: ${WHATSAPP_PHONE_NUMBER_ID}
      verify_token: ${WHATSAPP_VERIFY_TOKEN}
      webhook_port: 8080
    whatsapp:
      access_token: ${WHATSAPP_ACCESS_TOKEN}
      enabled: false
      phone_number_id: ${WHATSAPP_PHONE_NUMBER_ID}
      verify_token: ${WHATSAPP_VERIFY_TOKEN}
      webhook_port: 8080
permissions: null
planning:
  checkpoint_enabled: true
  max_retries: 3
  max_steps: 20
snapshot:
  enabled: true
  prune_days: 7
storage:
  db_path: ~/.nanocode/data/nanocode.db
  enabled: true
tools:
  enabled:
  - bash
  - read
  - write
  - edit
  - glob
  - grep
  - ls
  - webfetch
  - websearch
  - exa
  - exa_fetch
  - free_exa
  - openwebsearch
  - todo
  - task
